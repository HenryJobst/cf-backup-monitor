services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: backup_monitor_dev
      POSTGRES_USER: backup_monitor
      POSTGRES_PASSWORD: backup_monitor
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backup_monitor -d backup_monitor_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  sandbox-db:
    image: postgres:16
    environment:
      POSTGRES_USER: sandbox_user
      POSTGRES_PASSWORD: sandbox_pass
      # POSTGRES_DB ist nicht gesetzt – das Init-Skript legt alle Datenbanken an.
    ports:
      - "5433:5432"
    volumes:
      - ./docker/sandbox-db-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sandbox_user -d sandbox_instance1"]
      interval: 5s
      timeout: 5s
      retries: 10
